name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check .
      - run: ruff format --check omniai tests
      - name: mypy
        run: |
          pip install -e ".[dev]"
          mypy omniai

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: omniai
          POSTGRES_PASSWORD: omniai
          POSTGRES_DB: omniai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U omniai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: pytest (sqlite + postgres backends, coverage gate)
        env:
          # test_buffer_backends.py runs the buffer suite against this
          # real Postgres in addition to sqlite, proving DB-agnosticism.
          OMNIAI_TEST_DATABASE_URL: postgresql+asyncpg://omniai:omniai@localhost:5432/omniai_test
        run: pytest --cov=omniai --cov-report=term

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway image
        run: docker build -f deploy/Dockerfile -t omniai-gateway:ci .
      - name: Validate compose file
        env:
          POSTGRES_PASSWORD: ci-only
          OMNIAI_API_KEYS: ci-only
        run: docker compose -f deploy/docker-compose.yml config --quiet
